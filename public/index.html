<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
    <title>資金費率套利雷達</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
    <style>
    :root {
        --bg: #080c12;
        --bg2: #0d1420;
        --bg3: #111927;
        --bg4: #161f2e;
        --bg5: #1c2538;
        --bd: #1e2d42;
        --bd2: #263650;
        --tx: #c8d8ea;
        --dim: #4a6380;
        --mute: #2a3f58;
        --ac: #00d4ff;
        --gn: #00e676;
        --rd: #ff4f6a;
        --yw: #ffc107;
        --og: #ff8c00;
        --mono: 'Space Mono', monospace;
        --sans: 'Noto Sans TC', sans-serif;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background: var(--bg);
        color: var(--tx);
        font-family: var(--sans);
        min-height: 100vh;
        overflow-x: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image: linear-gradient(var(--bd) 1px, transparent 1px), linear-gradient(90deg, var(--bd) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: .13;
    }/* ── Header ────────────────── */
    header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(8, 12, 18, .96);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--bd);
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo-icon {
        width: 32px;
        height: 32px;
        border: 1.5px solid var(--ac);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        box-shadow: 0 0 10px rgba(0, 212, 255, .2);
    }

    .logo h1 {
        font-family: var(--mono);
        font-size: 13px;
        color: #fff;
        letter-spacing: .5px;
    }

    .logo p {
        font-size: 9px;
        color: var(--dim);
        letter-spacing: 1px;
        margin-top: 1px;
    }

    .hdr-r {
        display: flex;
        align-items: center;
        gap: 7px;
    }

    .pill {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--bg3);
        border: 1px solid var(--bd);
        border-radius: 20px;
        padding: 4px 10px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--dim);
    }

    .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--mute);
    }

    .dot.live {
        background: var(--gn);
        box-shadow: 0 0 6px var(--gn);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% {
            opacity:1
        }

        50% {
            opacity: .3
        }
    }

    .btn-sm {
        background: rgba(0, 212, 255, .1);
        border: 1px solid rgba(0, 212, 255, .3);
        color: var(--ac);
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 11px;
        padding: 5px 10px;
        cursor: pointer;
    }

    .btn-sm:disabled {
        opacity: .3;
        cursor: not-allowed;
    }

    .pgbar {
        position: fixed;
        bottom: 0;
        left: 0;
        height: 2px;
        z-index: 200;
        background: linear-gradient(90deg, var(--ac), var(--gn));
        box-shadow: 0 0 6px var(--ac);
        transition: width 1s linear;
    }/* ── 統計卡片 ───────────────── */
    .stats {
        display: flex;
        gap: 9px;
        padding: 12px 16px;
        overflow-x: auto;
        scrollbar-width: none;
        position: relative;
        z-index: 10;
    }

    .stats::-webkit-scrollbar {
        display: none;
    }

    .sc {
        flex: 0 0 125px;
        background: var(--bg2);
        border: 1px solid var(--bd);
        border-radius: 10px;
        padding: 11px 13px;
        position: relative;
        overflow: hidden;
    }

    .sc::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
    }

    .c-b::before {
        background:var(--ac)
    }

    .c-g::before {
        background: var(--gn)
    }

    .c-o::before {
        background:var(--og)
    }

    .c-y::before {
        background: var(--yw)
    }

    .sl {
        font-size: 9px;
        color: var(--dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: var(--mono);
    }

    .sv {
        font-size: 18px;
        font-family: var(--mono);
        font-weight: 700;
        color: #fff;
        margin-top: 3px;
    }

    .ss {
        font-size: 10px;
        color: var(--dim);
        margin-top: 2px;
    }/* ── 摺疊區塊 ───────────────── */
    .section {
        margin: 0 16px 10px;
        position: relative;
        z-index: 10;
    }

    .sec-btn {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--bd);
        color: var(--tx);
        border-radius: 10px;
        padding: 11px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        font-family: var(--sans);
        font-size: 13px;
    }

    .sec-btn .arr {
        transition: transform .2s;
        font-size: 10px;
        color: var(--dim);
    }

    .sec-btn.open .arr {
        transform: rotate(180deg);
    }

    .sec-body {
        background: var(--bg2);
        border: 1px solid var(--bd);
        border-top: none;
        border-radius: 0 0 10px 10px;
        padding: 14px;
        display: none;
    }

    .sec-body.show {
        display: block;
    }/* ── 表單元素 ───────────────── */
    .row {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 11px;
        flex-wrap: wrap;
    }

    .lbl {
        font-size: 11px;
        color: var(--dim);
        min-width: 60px;
        font-family: var(--mono);
    }

    .inp, .sel {
        flex: 1;
        min-width: 90px;
        background: var(--bg3);
        border: 1px solid var(--bd2);
        color: #fff;
        border-radius: 6px;
        padding: 7px 11px;
        font-family: var(--mono);
        font-size: 12px;
        outline: none;
    }

    .sel {
        appearance: none;
        cursor: pointer;
    }

    .inp:focus, .sel:focus {
        border-color: var(--ac);
    }

    .unit {
        font-size: 11px;
        color: var(--dim);
        font-family: var(--mono);
    }

    .note {
        font-size: 10px;
        color: var(--mute);
        margin-top: 10px;
        line-height: 1.65;
        font-family: var(--mono);
    }/* ── 標籤 ───────────────────── */
    .tag {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 9px;
        font-family: var(--mono);
        font-weight: 700;
        letter-spacing: .5px;
    }

    .t-long {
        background: rgba(0, 230, 118, .12);
        color: var(--gn);
        border: 1px solid rgba(0, 230, 118, .25);
    }

    .t-short {
        background: rgba(255, 79, 106, .12);
        color: var(--rd);
        border: 1px solid rgba(255, 79, 106, .25);
    }

    .divider {
        height: 1px;
        background: var(--bd);
        margin: 10px 0;
    }/* ── 篩選 ───────────────────── */
    .filters {
        padding: 0 16px 10px;
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        position: relative;
        z-index: 10;
    }

    .fg {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--bg2);
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 6px 10px;
        flex: 1;
        min-width: 130px;
    }

    .fl {
        font-size: 9px;
        color: var(--dim);
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: var(--mono);
        white-space: nowrap;
    }

    .fi, .fs {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--tx);
        font-family: var(--mono);
        font-size: 11px;
        outline: none;
        appearance: none;
        cursor: pointer;
        min-width: 0;
    }

    .ex-chips {
        padding: 0 16px 10px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        position: relative;
        z-index: 10;
    }

    .chip {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 10px;
        font-family: var(--mono);
        font-weight: 700;
        cursor: pointer;
        border: 1px solid;
        letter-spacing: .5px;
        transition: opacity .15s;
    }

    .chip.active {
        opacity:1
    }

    .chip:not(.active) {
        opacity: .3
    }

    .ch-b {
        color: #f0b90b;
        border-color: rgba(240, 185, 11, .4);
        background: rgba(240, 185, 11, .08);
    }

    .ch-by {
        color: #ff8c5a;
        border-color: rgba(255, 107, 53, .4);
        background: rgba(255, 107, 53, .08);
    }

    .ch-o {
        color: #29b6f6;
        border-color: rgba(0, 212, 255, .4);
        background: rgba(0, 212, 255, .08);
    }

    .ch-bg {
        color: #00d09c;
        border-color: rgba(0, 208, 156, .4);
        background: rgba(0, 208, 156, .08);
    }

    .ch-m {
        color: #b39ddb;
        border-color: rgba(179, 157, 219, .4);
        background: rgba(179, 157, 219, .08);
    }

    .ch-k {
        color: #26c6da;
        border-color: rgba(38, 198, 218, .4);
        background: rgba(38, 198, 218, .08);
    }

    .ch-gate {
        color: #e040fb;
        border-color: rgba(224, 64, 251, .4);
        background: rgba(224, 64, 251, .08);
    }

    .ch-bx {
        color: #ff6e40;
        border-color: rgba(255, 110, 64, .4);
        background: rgba(255, 110, 64, .08);
    }

    .ex-st {
        padding: 0 16px 10px;
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        position: relative;
        z-index: 10;
    }

    .est {
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 9px;
        font-family: var(--mono);
        display: flex;
        align-items: center;
        gap: 3px;
    }

    .est.ok {
        background: rgba(0, 230, 118, .1);
        color: var(--gn);
        border: 1px solid rgba(0, 230, 118, .2);
    }

    .est.err {
        background: rgba(255, 79, 106, .1);
        color: var(--rd);
        border: 1px solid rgba(255, 79, 106, .2);
    }/* ── 卡片 ───────────────────── */
    .cards {
        padding: 0 16px 80px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: relative;
        z-index: 10;
    }

    .card {
        background: var(--bg2);
        border: 1px solid var(--bd);
        border-radius: 10px;
        overflow: hidden;
    }

    .card.h1 {
        border-color: rgba(255, 140, 0, .45);
    }

    .card.h2 {
        border-color: rgba(255, 193, 7, .35);
    }

    .card.h3 {
        border-color: rgba(0, 230, 118, .28);
    }/* 卡片頂部 */

    .ch {
        padding: 10px 13px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--bd);
        cursor: pointer;
        user-select: none;
    }

    .cl {
        display: flex;
        align-items: center;
        gap: 7px;
        flex-wrap: wrap;
    }

    .crk {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--mute);
        min-width: 16px;
    }

    .cn {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 14px;
        color: #fff;
    }

    .ctag {
        font-size: 9px;
        color: var(--dim);
        background: var(--bg3);
        border: 1px solid var(--bd);
        border-radius: 3px;
        padding: 1px 5px;
        font-family: var(--mono);
    }

    .cr {
        text-align: right;
        flex-shrink: 0;
    }

    .csp {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 13px;
    }

    .csl {
        font-size: 9px;
        color: var(--dim);
        font-family: var(--mono);
        letter-spacing: 1px;
        margin-top: 1px;
    }/* 費率格 */

    .cb {
        padding: 8px 13px;
    }

    .rgrid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
    }

    .rb {
        background: var(--bg3);
        border: 1px solid var(--bd);
        border-radius: 6px;
        padding: 6px 7px;
        text-align: center;
    }

    .rb.mx {
        border-color: rgba(0, 230, 118, .4);
        background: rgba(0, 230, 118, .06);
    }

    .rb.mn {
        border-color: rgba(255, 79, 106, .35);
        background: rgba(255, 79, 106, .05);
    }

    .rex {
        font-size: 8px;
        font-family: var(--mono);
        font-weight: 700;
        letter-spacing: .5px;
        margin-bottom: 2px;
    }

    .rrate {
        font-size: 11px;
        font-family: var(--mono);
    }

    .rprice {
        font-size: 10px;
        font-family: var(--mono);
        color: var(--ac);
        margin-top: 2px;
    }

    .rna {
        color: var(--mute);
        font-size: 10px;
    }/* 展開 */

    .cf {
        padding: 0 13px;
        max-height: 0;
        overflow: hidden;
        transition: max-height .35s ease, padding .3s;
    }

    .cf.open {
        max-height: 1600px;
        padding: 10px 13px 14px;
    }/* Tab */

    .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
    }

    .tab {
        flex: 1;
        padding: 7px;
        text-align: center;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: .5px;
        background: var(--bg3);
        border: 1px solid var(--bd);
        border-radius: 6px;
        cursor: pointer;
        color: var(--dim);
    }

    .tab.active {
        background: rgba(0, 212, 255, .1);
        border-color: rgba(0, 212, 255, .35);
        color: var(--ac);
    }

    .tp {
        display: none;
    }

    .tp.show {
        display: block;
    }/* ── 費率收益 ───────────────── */
    .earn-box {
        background: var(--bg4);
        border: 1px solid var(--bd2);
        border-radius: 7px;
        padding: 10px;
    }

    .er {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }

    .er:last-child {
        margin-bottom: 0;
    }

    .ek {
        font-size: 10px;
        color: var(--dim);
        font-family: var(--mono);
    }

    .ev {
        font-size: 11px;
        font-family: var(--mono);
        font-weight: 700;
    }

    .g {
        color:var(--gn)
    }

    .r {
        color:var(--rd)
    }

    .y {
        color:var(--yw)
    }

    .a {
        color:var(--ac)
    }

    .o {
        color: var(--og)
    }

    .g2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .gi {
        text-align: center;
    }

    .gl {
        font-size: 9px;
        color: var(--dim);
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: var(--mono);
    }

    .gv {
        font-size: 14px;
        font-family: var(--mono);
        font-weight: 700;
        margin-top: 3px;
    }

    .gv.lg {
        font-size: 17px;
    }/* ── 合約價差 ───────────────── */
    .pr-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 11px;
        background: var(--bg3);
        border: 1px solid var(--bd);
        border-radius: 7px;
        margin-bottom: 6px;
    }

    .pr-l {
        display: flex;
        align-items: center;
        gap: 7px;
    }

    .pr-ex {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
    }

    .pr-p {
        font-family: var(--mono);
        font-size: 12px;
        color: #fff;
        font-weight: 700;
    }

    .pr-d {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
    }

    .cv-card {
        border-radius: 8px;
        padding: 11px;
        margin-top: 8px;
    }

    .cv-card.up {
        background: rgba(0, 230, 118, .07);
        border: 1px solid rgba(0, 230, 118, .2);
    }

    .cv-card.dn {
        background: rgba(255, 79, 106, .07);
        border: 1px solid rgba(255, 79, 106, .2);
    }

    .cv-title {
        font-size: 10px;
        font-family: var(--mono);
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 8px;
    }

    .cv-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .cv-item {
        text-align: center;
    }

    .cv-lbl {
        font-size: 9px;
        color: var(--dim);
        font-family: var(--mono);
    }

    .cv-val {
        font-size: 15px;
        font-family: var(--mono);
        font-weight: 700;
        margin-top: 3px;
    }/* ── 止盈止損 ───────────────── */
    /* 設定列 */
    .tpsl-settings {
        display: flex;
        gap: 7px;
        margin-bottom: 10px;
    }

    .tpsl-set-box {
        flex: 1;
        background: var(--bg3);
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 8px 10px;
        display: flex;
        align-items: center;
        gap: 7px;
    }

    .tpsl-set-lbl {
        font-size: 10px;
        color: var(--dim);
        font-family: var(--mono);
        white-space: nowrap;
        flex-shrink: 0;
    }

    .tpsl-set-inp {
        flex: 1;
        background: var(--bg4);
        border: 1px solid var(--bd2);
        color: var(--ac);
        border-radius: 5px;
        padding: 4px 7px;
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 700;
        outline: none;
        text-align: center;
        min-width: 0;
        width: 50px;
    }

    .tpsl-set-inp:focus {
        border-color: var(--ac);
    }

    .tpsl-set-unit {
        font-size: 10px;
        color: var(--dim);
        font-family: var(--mono);
    }/* 爆倉提示 */

    .liq-hint {
        background: rgba(0, 212, 255, .05);
        border: 1px solid rgba(0, 212, 255, .15);
        border-radius: 7px;
        padding: 9px 12px;
        margin-bottom: 10px;
        font-family: var(--mono);
        font-size: 10px;
        line-height: 1.85;
        color: var(--dim);
    }

    .liq-hint b {
        color: var(--ac);
    }/* 爆倉輸入 2欄 */

    .liq-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 10px;
    }

    .liq-box {
        background: var(--bg3);
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 10px;
    }

    .liq-title {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 9px;
    }

    .liq-lbl {
        font-size: 9px;
        color: var(--dim);
        font-family: var(--mono);
        margin-bottom: 4px;
    }

    .liq-inp {
        width: 100%;
        background: var(--bg4);
        border: 1px solid var(--bd2);
        color: #fff;
        border-radius: 5px;
        padding: 7px 9px;
        font-family: var(--mono);
        font-size: 12px;
        outline: none;
    }

    .liq-inp:focus {
        border-color: var(--ac);
    }

    .liq-inp::placeholder {
        color: var(--mute);
    }

    .liq-hint2 {
        font-size: 9px;
        color: var(--mute);
        font-family: var(--mono);
        margin-top: 4px;
    }/* 結果：4個大數字 */

    .tpsl-result {
        background: var(--bg3);
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 12px;
    }

    .tpsl-res-title {
        font-size: 10px;
        color: var(--dim);
        font-family: var(--mono);
        letter-spacing: 1px;
        margin-bottom: 12px;
    }/* 2x2 格局 */

    .tpsl-4grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 10px;
    }

    .tpsl-cell {
        background: var(--bg4);
        border-radius: 8px;

<body>

        <table>
            <thead>
                <tr>
                    <th onclick="sortBy('symbol')">幣種</th>
                    <th onclick="sortBy('netSpread')" class="srt">淨費差 ▼</th>
                    <th onclick="sortBy('annual')">年化</th>
                    <th onclick="sortBy('priceDiffPct')">價格差%</th>
                    <th onclick="sortBy('binance')">Binance</th>
                    <th onclick="sortBy('bybit')">Bybit</th>
                    <th onclick="sortBy('okx')">OKX</th>
                    <th onclick="sortBy('bitget')">Bitget</th>
                    <th onclick="sortBy('mexc')">MEXC</th>
                    <th onclick="sortBy('kucoin')">KuCoin</th>
                    <th onclick="sortBy('gate')">Gate.io</th>

                </tr>

    <script>
    // ═══════════════════════════════════════════════
    const REFRESH = 60,
        API = '/api/funding';
    const FEES = {
        binance: .0005,
        bybit: .0006,
        okx: .0005,
        bitget: .0006,
        mexc: .0002,
        kucoin: .0006,
        gate: .0005,
        bingx: .0005
    };
    const EXL = {
        binance: 'Binance',
        bybit: 'Bybit',
        okx: 'OKX',
        bitget: 'Bitget',
        mexc: 'MEXC',
        kucoin: 'KuCoin',
        gate: 'Gate.io',
        bingx: 'BingX'
    };
    const EX_ALL = ['binance', 'bybit', 'okx', 'bitget', 'mexc', 'kucoin', 'gate', 'bingx'];
    const EXC = {
        binance: '#f0b90b',
        bybit: '#ff8c5a',
        okx: '#29b6f6',
        bitget: '#00d09c',
        mexc: '#b39ddb',
        kucoin: '#26c6da',
        gate: '#e040fb',
        bingx: '#ff6e40'
    };

    let allData = [],
        visEx = new Set(EX_ALL),
        curSort = 'netSpread',
        sortAsc = false;
    // 記憶止盈止損輸入值，key = symbol，value = {lev, buf, shortLiq, longLiq}
    const tpslMemory = {};
    let cd = REFRESH,
        timer = null,
        loading = false;

    // ── 載入 ──────────────────────────────────────
    async function loadData() {
        if (loading)
            return;
        loading = true;
        const btn = document.getElementById('rbtn');
        btn.disabled = true;
        setSt('info', '更新中…');
        try {
            const j = await (await fetch(API + '?t=' + Date.now())).json();
            if (!j.success)
                throw new Error(j.error || 'error');
            allData = j.data;
            renderExSt(j.exchangeStatus || {});
            updateStats();
            applyF();
            buildPairs();
            setSt('live', `${allData.length} 個幣種`);
            clearInterval(timer);
            cd = REFRESH;
            startCD();
        } catch (e) {
            setSt('err', '失敗：' + e.message);
            showEmpty('❌ ' + e.message);
        }
        loading = false;
        btn.disabled = false;
    }
    function startCD() {
        const bar = document.getElementById('pgbar');
        bar.style.width = '100%';
        timer = setInterval(() => {
            cd--;
            bar.style.width = (cd / REFRESH * 100) + '%';
            if (cd <= 0) {
                clearInterval(timer);
                loadData();
            }
        }, 1000);
    }

    // ── 統計 ──────────────────────────────────────
    function updateStats() {
        const th = parseFloat(document.getElementById('threshold').value) || 0;
        document.getElementById('s1').textContent = allData.length;
        document.getElementById('s2').textContent = allData.filter(d => d.netSpread > th).length;
        if (allData[0]) {
            const t = allData[0];
            document.getElementById('s3').textContent = (t.spread * 100).toFixed(3) + '%';
            document.getElementById('s3b').textContent = t.symbol + '/USDT';
            document.getElementById('s4').textContent = (t.netSpread * 3 * 365 * 100).toFixed(0) + '%';
        }
    }
    function renderExSt(st) {
        document.getElementById('exst').innerHTML = EX_ALL.map(ex =>
        `<div class="est ${st[ex] === 'ok' ? 'ok' : 'err'}">${st[ex] === 'ok' ? '●' : '✕'} ${EXL[ex]}</div>`).join('');
    }
    function toggleEx(ex, el) {
        visEx.has(ex) ? visEx.delete(ex) : visEx.add(ex);
        el.classList.toggle('active');
        applyF();
    }

    // ── 篩選排序 ───────────────────────────────────
    function applyF() {
        const kw = document.getElementById('search').value.trim().toUpperCase();
        const th = parseFloat(document.getElementById('threshold').value) || 0;
        const sk = document.getElementById('sortsel').value;
        let rows = allData.filter(r => {
            if (kw && !r.symbol.includes(kw))
                return false;
            if (r.netSpread < th)
                return false;
            return EX_ALL.filter(e => visEx.has(e) && r[e] !== undefined).length >= 2;
        });
        rows.sort((a, b) => {
            const va = a[sk] ?? -Infinity,
                vb = b[sk] ?? -Infinity;
            return sortAsc ? va - vb : vb - va;
        });
        renderCards(rows);
        renderTable(rows);
        document.getElementById('s2').textContent = rows.length;
    }
    function sortBy(k) {
        curSort === k ? sortAsc = !sortAsc : (curSort = k, sortAsc = false);
        if (['netSpread', 'spread', 'priceDiffPct', 'annual'].includes(k))
            document.getElementById('sortsel').value = k;
        applyF();
    }

    // ── 合約價差面板 ───────────────────────────────
    function buildPricePanel(row, amt) {

            return '<div style="color:var(--dim);font-family:var(--mono);font-size:11px;padding:10px">無足夠價格資料</div>';
        const base = row.prices[row.priceMaxEx];
        const rows = avail.map(ex => {
            const p = row.prices[ex],
                isShort = ex === row.maxEx,
                isLong = ex === row.minEx;
            const diff = ex !== row.priceMaxEx ? (p - base) / base * 100 : null;
            return `<div class="pr-row">

            ;
        }).join('');

      </div>
    </div>
    <div class="note" style="margin-top:8px">以投入 ${

        amt} U 估算。實際收斂時機無法預測。</div>` : '';
        return rows + conv;
    }

    function buildTPSL(row) {

    // ── 核心：計算並顯示 4 個點位 ──────────────────
    function calcT(sym) {
        const lev = parseFloat(document.getElementById('lev-' + sym)?.value) || 3;
        const buf = (parseFloat(document.getElementById('buf-' + sym)?.value) || 5) / 100;
        const shortLiq = parseFloat(document.getElementById('sl-' + sym)?.value);

        const sp=row?.prices?.[row?.maxEx];
        const lp=row?.prices?.[row?.minEx];

        // 更新爆倉距離提示
        const liqD = (1 / lev * 100).toFixed(1);
        const hint = document.getElementById('lh-' + sym);
        if (hint)
            hint.innerHTML =
            `<b>${lev}x槓桿</b> → 理論爆倉距離 ≈ <b>${liqD}%</b>　緩衝 ${(buf * 100).toFixed(0)}% → 距爆倉還有 <b>${((1 / lev - buf) * 100).toFixed(1)}%</b> 時觸發<br>` +
            (sp ? `做空現價 <b>${fP(sp)}</b>，理論爆倉參考 <b>${fP(sp * (1 + 1 / lev))}</b>` : '') +

        const el = document.getElementById('tpsl-r-' + sym);
        if (!shortLiq && !longLiq) {

            return;
        }

        // ── 計算 4 個點位 ──────────────────────────
        // 止損：距自己爆倉還有 buf% 時先跑
        const shortSL = shortLiq ? shortLiq * (1 - buf) : null; // 做空止損：漲到這裡先出
        const longSL = longLiq ? longLiq * (1 + buf) : null; // 做多止損：跌到這裡先出

        // 止盈：對面快爆倉時，我這邊大賺，建議鎖利
        const shortTP = longLiq ? longLiq * (1 + buf) : null; // 做空止盈：跌到對面快爆才止盈
        const longTP = shortLiq ? shortLiq * (1 - buf) : null; // 做多止盈：漲到對面快爆才止盈

        const f = v => v ? fP(v) : '—';
        // 距現價距離
        const sDist = sp && shortSL ? ((shortSL - sp) / sp * 100).toFixed(2) + '%' : null;
        const lDist = lp && longSL ? ((lp - longSL) / lp * 100).toFixed(2) + '%' : null;
        const sTPD = sp && shortTP ? ((sp - shortTP) / sp * 100).toFixed(2) + '%' : null;
        const lTPD = lp && longTP ? ((longTP - lp) / lp * 100).toFixed(2) + '%' : null;

        (buf * 100).toFixed(0)}%）</div>

        row ? EXL[row.maxEx] : '做空'}）</div>
          <div class="tpsl-cell-type"><span style="color:var(--rd)">●</span> 止損</div>
          <div class="tpsl-cell-price r">${
        f(shortSL)}</div>
          <div class="tpsl-cell-formula">做空爆倉 × ${(1 - buf).toFixed(3)}</div>
          ${sDist ? `<div class="tpsl-cell-dist" style="color:var(--rd)">距現價 ${sDist}</div>` : ''}
        </div>
        <!-- 做多止損 -->
        <div class="tpsl-cell sl">
          <div class="tpsl-cell-side" style="color:var(--gn)">做多倉（${


        row ? EXL[row.minEx] : '做多'}）</div>
          <div class="tpsl-cell-type"><span style="color:var(--rd)">●</span> 止損</div>
          <div class="tpsl-cell-price r">${
        f(longSL)}</div>
          <div class="tpsl-cell-formula">做多爆倉 × ${(1 + buf).toFixed(3)}</div>
          ${lDist ? `<div class="tpsl-cell-dist" style="color:var(--rd)">距現價 ${lDist}</div>` : ''}
        </div>
        <!-- 做空止盈 -->
        <div class="tpsl-cell tp">

        row ? EXL[row.maxEx] : '做空'}）</div>
          <div class="tpsl-cell-type"><span style="color:var(--gn)">●</span> 止盈</div>
          <div class="tpsl-cell-price g">${
        f(shortTP)}</div>
          <div class="tpsl-cell-formula">做多爆倉 × ${(1 + buf).toFixed(3)}</div>
          ${sTPD ? `<div class="tpsl-cell-dist" style="color:var(--gn)">距現價 ${sTPD}</div>` : ''}
        </div>
        <!-- 做多止盈 -->
        <div class="tpsl-cell tp">
          <div class="tpsl-cell-side" style="color:var(--gn)">做多倉（${


        row ? EXL[row.minEx] : '做多'}）</div>
          <div class="tpsl-cell-type"><span style="color:var(--gn)">●</span> 止盈</div>
          <div class="tpsl-cell-price g">${
        f(longTP)}</div>
          <div class="tpsl-cell-formula">做空爆倉 × ${(1 - buf).toFixed(3)}</div>
          ${lTPD ? `<div class="tpsl-cell-dist" style="color:var(--gn)">距現價 ${lTPD}</div>` : ''}
        </div>
      </div>

      <!-- 情境說明 -->
      <div class="tpsl-notes">
        ${




        shortSL ? `<div class="tpsl-note-item"><span class="tpsl-note-icon">🔴</span>
          <div class="tpsl-note-text">價格漲到 <span class="rv2">${f(shortSL)}</span>：<b>做空止損出場</b>，做多倉仍持有，需自行評估是否同步平倉。</div></div>` : ''}
        ${longSL ? `<div class="tpsl-note-item"><span class="tpsl-note-icon">🔴</span>
          <div class="tpsl-note-text">價格跌到 <span class="rv2">${f(longSL)}</span>：<b>做多止損出場</b>，做空倉仍持有，需自行評估是否同步平倉。</div></div>` : ''}
        ${shortTP && longLiq ? `<div class="tpsl-note-item"><span class="tpsl-note-icon">🟢</span>

        ${longTP && shortLiq ? `<div class="tpsl-note-item"><span class="tpsl-note-icon">🟢</span>
          <div class="tpsl-note-text">價格漲到 <span class="gv2">${f(longTP)}</span>：對面（做空）快爆倉，<b>做多大賺，建議止盈鎖利</b>。</div></div>` : ''}
        <div class="tpsl-note-item"><span class="tpsl-note-icon">⚠️</span>
          <div class="tpsl-note-text">一邊觸發止損後，另一邊已<b>失去對沖保護</b>，請立即決定是否平倉剩餘部位。<br>緩衝建議：1-3x槓桿用 5-10%，5-6x槓桿用 3-5%。</div></div>
      </div>
    </div>`



        ;
    }

    // ── 桌機表格 ───────────────────────────────────
    const dtExpanded = new Set(); // 記錄哪些行展開中

    function renderTable(rows) {
        const tbody = document.getElementById('tbody');
        if (!rows.length) {
            tbody.innerHTML = `<tr><td colspan="12" style="text-align:center;padding:40px;color:var(--dim);font-family:var(--mono)">無符合資料</td></tr>`;
            return;
        }
        const maxS = rows[0]?.spread || 1;
        tbody.innerHTML = rows.map((row, i) => {
            const bw = Math.min((row.spread / maxS) * 50, 50);
            const annual = (row.netSpread * 3 * 365 * 100).toFixed(1);
            const sc = sColor(row.netSpread);
            const pd = row.priceDiffPct !== null ? (row.priceDiffPct * 100).toFixed(4) + '%' : '—';
            const isOpen = dtExpanded.has(row.symbol);
            const mainRow = `<tr class="${i < 1 ? 'h1' : i < 2 ? 'h2' : ''}" id="dtr-${row.symbol}">
      <td>
        <div class="cc">
          <span class="crk2">${

            i + 1}</span>
          <button class="expand-btn ${isOpen ? 'open' : ''}" onclick="dtToggle('${row.symbol}')" id="dtbtn-${row.symbol}">
            <span class="arr">▶</span>
            <span class="cn2">${
            row.symbol}</span>
          </button>
          <span class="ct2">PERP</span>
        </div>
      </td>
      <td><div class="sw"><span style="font-family:var(--mono);font-weight:700;color:${



            sc}">${(row.netSpread * 100).toFixed(4)}%</span><div class="sbar" style="width:${bw}px"></div></div></td>
      <td style="color:var(--yw);font-family:var(--mono)">${annual}%</td>
      <td style="font-family:var(--mono);font-size:10px;color:${row.priceDiffPct > 0.0003 ? 'var(--yw)' : 'var(--dim)'}">${pd}</td>
      ${EX_ALL.map(ex => {const lp=row.prices?.[ex],rate = row[ex];return `<td><div style="text-align:right">
          ${rate !== undefined ? `<div class="${rate > 1e-4 ? 'rp' : rate < -1e-4 ? 'rn' : 'rz'}">${rate >= 0 ? '+' : ''}${(rate * 100).toFixed(4)}%</div>` : `<span class="rna2">—</span>`}
          ${lp ? `<div style="font-family:var(--mono);font-size:9px;color:var(--ac)">${fP(lp)}</div>` : ''}
        </div></td>`;}).join('')}
      <td style="font-family:var(--mono);font-size:10px" class="settle-td" data-sym="${row.symbol}">${bestNext(row)}</td>
    </tr>`
            ;

            // 展開行（預建，靠 display 控制顯示）
            const expandRow = `<tr class="dt-expand-tr" id="dtex-${row.symbol}" style="display:${isOpen ? 'table-row' : 'none'}">
      <td colspan="12">
        <div class="dt-expand-inner">
          <div class="dt-content">
            <div class="dt-tabs">
              <div class="dt-tab active" onclick="dtSwTab(this,'dtp-earn-${



            row.symbol}','${row.symbol}')">💰 費率收益</div>
              <div class="dt-tab" onclick="dtSwTab(this,'dtp-price-${row.symbol}','${row.symbol}')">📊 合約價差</div>
              <div class="dt-tab" onclick="dtSwTab(this,'dtp-tpsl-${row.symbol}','${row.symbol}')">🎯 止盈止損</div>
            </div>
            <div class="dt-panel show" id="dtp-earn-${
            row.symbol}">${buildEarnPanel(row)}</div>
            <div class="dt-panel" id="dtp-price-${row.symbol}">${buildPricePanel(row, parseFloat(document.getElementById('c-amt')?.value) || 1000)}</div>
            <div class="dt-panel" id="dtp-tpsl-${row.symbol}">${buildTPSL(row)}</div>
          </div>
        </div>
      </td>
    </tr>`



            ;

            return mainRow + expandRow;
        }).join('');
        tbody.querySelectorAll('.settle-td').forEach(td => {
            td.innerHTML = td.textContent;
        });
    }

    function dtToggle(sym) {
        const exRow = document.getElementById('dtex-' + sym);
        const btn = document.getElementById('dtbtn-' + sym);
        if (!exRow)
            return;
        const isOpen = exRow.style.display !== 'none';
        if (isOpen) {
            exRow.style.display = 'none';
            dtExpanded.delete(sym);
            btn.classList.remove('open');
        }
        else {
            exRow.style.display = 'table-row';
            dtExpanded.add(sym);
            btn.classList.add('open');
        }
    }

    function dtSwTab(el, pid, sym) {
        const wrap = document.getElementById('dtex-' + sym);
        wrap.querySelectorAll('.dt-tab').forEach(t => t.classList.remove('active'));
        wrap.querySelectorAll('.dt-panel').forEach(p => p.classList.remove('show'));
        el.classList.add('active');
        document.getElementById(pid).classList.add('show');
    }

    // 費率收益面板（桌機展開用）
    function buildEarnPanel(row) {
        const amt = parseFloat(document.getElementById('c-amt')?.value) || 1000;
        const periods = parseFloat(document.getElementById('c-period')?.value) || 3;
        const earn = calcEarn(row, amt, periods);
        const be = Math.ceil(row.totalFee / row.spread);
        const annual = (row.netSpread * 3 * 365 * 100).toFixed(1);
        return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">
    <div><div class="gl">建議做空</div><div style="margin-top:3px"><span class="tag t-short">${EXL[row.maxEx]}</span></div></div>
    <div><div class="gl">建議做多</div><div style="margin-top:3px"><span class="tag t-long">${EXL[row.minEx]}</span></div></div>
    <div><div class="gl">年化（淨）</div><div class="gv y">${annual}%</div></div>
    <div><div class="gl">下次結算</div><div class="gv" style="color:var(--dim);font-size:12px">${bestNext(row)}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:var(--bg4);border:1px solid var(--bd2);border-radius:7px;padding:12px">
    <div class="gi"><div class="gl">投入 ${

        amt} U × ${periods} 週期</div></div>
    <div class="gi"><div class="gl">費率收入</div><div class="gv g">+${earn.income.toFixed(2)} U</div></div>
    <div class="gi"><div class="gl">手續費</div><div class="gv r">-${earn.fee.toFixed(2)} U</div></div>
    <div class="gi"><div class="gl">預估淨收益</div><div class="gv lg ${earn.net >= 0 ? 'g' : 'r'}">${earn.net >= 0 ? '+' : ''}${earn.net.toFixed(2)} U</div></div>
  </div>
  <div class="note" style="margin-top:8px">${
        EXL[row.maxEx]} ${(FEES[row.maxEx] * 100).toFixed(3)}% + ${EXL[row.minEx]} ${(FEES[row.minEx] * 100).toFixed(3)}% = 合計 ${(row.totalFee * 100).toFixed(3)}%　損益兩平：${be} 週期（≈${(be * 8 / 24).toFixed(1)}天）</div>`;
    }

    // ── 費率計算器 ─────────────────────────────────
    function buildPairs() {
        const sel = document.getElementById('c-pair');
        sel.innerHTML = '<option value="">── 選擇套利組合 ──</option>' +
        allData.slice(0, 60).map(r => `<option value="${r.symbol}">${r.symbol} ${EXL[r.maxEx]}空/${EXL[r.minEx]}多 淨${(r.netSpread * 100).toFixed(4)}%</option>`).join('');
        updateEarn();
    }
    function updateEarn() {
        const sym=document.getElementById('c-pair')?.value;
        const amt = parseFloat(document.getElementById('c-amt')?.value) || 0;
        const periods = parseFloat(document.getElementById('c-period')?.value) || 3;
        const el = document.getElementById('earn-res');
        if (!sym || !amt) {
            el.innerHTML = '<div style="text-align:center;color:var(--dim);font-family:var(--mono);font-size:11px">請先選擇套利組合並輸入金額</div>';
            return;
        }
        const row = allData.find(r => r.symbol === sym);
        if (!row)
            return;
        const e = calcEarn(row, amt, periods);
        const annual = (row.netSpread * 3 * 365 * 100).toFixed(1);
        const be = Math.ceil(row.totalFee / row.spread);
        el.innerHTML = `<div class="g2" style="margin-bottom:10px">
    <div class="gi"><div class="gl">費率收入</div><div class="gv g">+${e.income.toFixed(2)} U</div></div>
    <div class="gi"><div class="gl">手續費</div><div class="gv r">-${e.fee.toFixed(2)} U</div></div>
    <div class="gi"><div class="gl">預估淨收益</div><div class="gv lg ${e.net >= 0 ? 'g' : 'r'}">${e.net >= 0 ? '+' : ''}${e.net.toFixed(2)} U</div></div>
    <div class="gi"><div class="gl">年化報酬</div><div class="gv y">${annual}%</div></div>
  </div>
  <div class="note">${
        EXL[row.maxEx]} ${(FEES[row.maxEx] * 100).toFixed(3)}% + ${EXL[row.minEx]} ${(FEES[row.minEx] * 100).toFixed(3)}% = 合計 ${(row.totalFee * 100).toFixed(3)}%<br>損益兩平：${be} 週期（≈${(be * 8 / 24).toFixed(1)} 天）</div>`;
    }

    // ── 工具函式 ───────────────────────────────────
    function calcEarn(row, amt, periods) {
        const income = amt * row.spread * periods,
            fee = amt * row.totalFee;
        return {
            income,
            fee,
            net: income - fee
        };
    }
    function fP(p) {
        if (!p || isNaN(p))
            return '—';
        return p >= 10000 ? p.toLocaleString('en-US', {
            maximumFractionDigits: 0
        }) : p >= 100 ? p.toLocaleString('en-US', {
            maximumFractionDigits: 2
        }) : p >= 1 ? p.toFixed(4) : p.toPrecision(4);
    }
    function sColor(ns) {
        return ns >= 0.001 ? 'var(--og)' : ns >= 0.0003 ? 'var(--yw)' : 'var(--gn)';
    }
    // 顯示各交易所個別結算時間
    function fmtTime(ms) {
        if (!ms)
            return null;
        const dt = new Date(ms);
        const diff = ms - Date.now();
        const today = new Date();
        const isToday = dt.getDate() === today.getDate() && dt.getMonth() === today.getMonth();
        const hhmm = dt.toLocaleTimeString('zh-TW', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        });
        const date = dt.toLocaleDateString('zh-TW', {
            month: '2-digit',
            day: '2-digit'
        });
        const timeStr = isToday ? hhmm : (date + ' ' + hhmm);
        if (diff <= 0)
            return '<span style="color:var(--rd);font-size:10px">即將結算</span>';
        if (diff < 3600000) {
            const m = Math.floor(diff / 60000);
            return '<span style="color:var(--yw);font-size:10px">' + m + '分後 ' + timeStr + '</span>';
        }
        return '<span style="color:var(--dim);font-size:10px">' + timeStr + '</span>';
    }

    function buildSettleTimes(row) {
        const EX_NEXT = {
            binance: 'binanceNext',
            bybit: 'bybitNext',
            okx: 'okxNext',
            bitget: 'bitgetNext',
            mexc: 'mexcNext',
            kucoin: 'kucoinNext',
            gate: 'gateNext',
            bingx: 'bingxNext'
        };
        const lines = EX_ALL.filter(e => row[e] !== undefined && row[EX_NEXT[e]]).map(e => {
            const t = fmtTime(row[EX_NEXT[e]]);
            return t ? `<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
      <span style="font-family:var(--mono);font-size:8px;font-weight:700;color:${EXC[e]}">${EXL[e].substring(0, 3)}</span>
      ${t}</div>` : '';
        }).filter(Boolean);
        if (!lines.length)
            return '<span style="color:var(--mute);font-size:10px;font-family:var(--mono)">—</span>';
        return lines.join('');
    }

    function bestNext(row) {
        const keys = ['binanceNext', 'bybitNext', 'okxNext', 'bitgetNext', 'mexcNext', 'kucoinNext', 'gateNext', 'bingxNext'];
        const ts = keys.map(k => row[k]).filter(Boolean);
        if (!ts.length)
            return '—';
        const next = Math.min(...ts);
        const diff = next - Date.now();
        const dt = new Date(next);
        const hhmm = dt.toLocaleTimeString('zh-TW', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        });
        const date = dt.toLocaleDateString('zh-TW', {
            month: '2-digit',
            day: '2-digit'
        });
        const today = new Date();
        const isToday = dt.getDate() === today.getDate() && dt.getMonth() === today.getMonth();
        const timeStr = isToday ? hhmm : (date + ' ' + hhmm);
        if (diff <= 0)
            return '<span style="color:var(--rd);font-weight:700">即將結算</span>';
        if (diff < 3600000) {
            const m = Math.floor(diff / 60000);
            return '<span style="color:var(--yw)">' + m + '分後 ' + hhmm + '</span>';
        }
        return timeStr;
    }
    function setSt(s, t) {
        document.getElementById('dot').className = 'dot' + (s === 'live' ? ' live' : '');
        document.getElementById('stxt').textContent = t;
    }
    function toggle(id) {
        document.getElementById('bb-' + id).classList.toggle('show');
        document.getElementById('tb-' + id).classList.toggle('open');
    }
    function swTab(el, pid, sym) {
        const cf = document.getElementById('cf-' + sym);
        cf.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        cf.querySelectorAll('.tp').forEach(p => p.classList.remove('show'));
        el.classList.add('active');
        document.getElementById(pid).classList.add('show');
    }
    function showEmpty(msg) {
        document.getElementById('cards').innerHTML = `<div class="empty">${msg}</div>`;
        document.getElementById('tbody').innerHTML = `<tr><td colspan="13" style="text-align:center;padding:40px;color:var(--rd);font-family:var(--mono)">${msg}</td></tr>`;
    }

    // ── Telegram 通知功能 ──────────────────────────────
    function updateTgThreshold() {
        const v = parseFloat(document.getElementById('tg-threshold-val')?.value) || 1;
        const el = document.getElementById('tg-threshold-hint');
        if (el)
            el.textContent = `目前設定：年化 ≥ ${(v * 100).toFixed(0)}% 才通知（在 Vercel 環境變數設 NOTIFY_THRESHOLD=${v}）`;
    }

    async function testNotify() {
        const el = document.getElementById('tg-test-result');
        el.textContent = '⏳ 發送中...';
        el.style.color = 'var(--dim)';
        try {
            const r = await fetch('/api/notify?t=' + Date.now());
            const j = await r.json();
            if (j.sent > 0) {
                el.textContent = `✅ 已發送！找到 ${j.opportunities} 個機會`;
                el.style.color = 'var(--gn)';
            } else {
                el.textContent = `ℹ️ ${j.message || '目前無符合門檻的機會'}`;
                el.style.color = 'var(--yw)';
            }
        } catch (e) {
            el.textContent = '❌ ' + e.message;
            el.style.color = 'var(--rd)';
        }
    }

    // QR Code 產生（使用 QR Server API，免費無需安裝）
    function generateQR(username) {
        const container = document.getElementById('tg-qr-inner');
        if (!container)
            return;
        const u = username.replace(/^@/, '').trim();
        if (!u || u.length < 3) {
            container.innerHTML = '<div style="font-size:20px">🤖</div><div style="font-size:9px;color:var(--mute);text-align:center">輸入 Bot Username<br>產生 QR Code</div>';
            return;
        }
        const url = `https://t.me/${u}`;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=110x110&data=${encodeURIComponent(url)}&bgcolor=17-25-39&color=0-212-255&format=png`;
        container.innerHTML = `
    <a href="${url}" target="_blank" style="display:block">
      <img src="${qrUrl}" width="110" height="110" style="border-radius:4px;display:block"
        onerror="this.parentElement.parentElement.innerHTML='<div style=\'font-size:9px;color:var(--rd)\'>QR 產生失敗<br>請確認 username</div>'"/>
    </a>
    <div style="font-size:9px;color:var(--ac);margin-top:4px;font-family:var(--mono)">@${

        u}</div>`;
    }

    loadData();
    </script>
</body>
</html>
